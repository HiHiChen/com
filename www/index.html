<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>计算器</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #1a1a2e;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      .calculator { width: 320px; background: #16213e; border-radius: 20px; padding: 20px; }

      .display { background: #0f3460; border-radius: 12px; padding: 20px; margin-bottom: 20px; text-align: right; }

      .display .expr { color: rgba(255, 255, 255, 0.4); font-size: 15px; min-height: 22px; word-break: break-all; }

      .display .result { color: #fff; font-size: 38px; font-weight: 300; margin-top: 6px; }

      .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

      .btn {
        padding: 18px 0; border: none; border-radius: 12px; font-size: 20px; cursor: pointer;
        transition: 0.12s; background: #1a1a40; color: #e0e0e0;
      }

      .btn:hover { filter: brightness(1.3); }
      .btn:active { transform: scale(0.93); }
      .btn.op { color: #00d2ff; }
      .btn.eq { background: #00d2ff; color: #16213e; font-weight: 600; }
      .btn.clr { color: #ff6b6b; }
      .btn.span2 { grid-column: span 2; }
      .btn.del { color: #ff6b6b; font-size: 16px; }
    </style>
  </head>
  <body>
    <div class="calculator">
      <div class="display">
        <div class="expr" id="expr"></div>
        <div class="result" id="result">0</div>
      </div>
      <div class="buttons">
        <button class="btn clr" data-key="AC">AC</button>
        <button class="btn del" data-key="DEL">DEL</button>
        <button class="btn op" data-key="%">%</button>
        <button class="btn op" data-key="/">÷</button>
        <button class="btn" data-key="7">7</button>
        <button class="btn" data-key="8">8</button>
        <button class="btn" data-key="9">9</button>
        <button class="btn op" data-key="*">×</button>
        <button class="btn" data-key="4">4</button>
        <button class="btn" data-key="5">5</button>
        <button class="btn" data-key="6">6</button>
        <button class="btn op" data-key="-">−</button>
        <button class="btn" data-key="1">1</button>
        <button class="btn" data-key="2">2</button>
        <button class="btn" data-key="3">3</button>
        <button class="btn op" data-key="+">+</button>
        <button class="btn span2" data-key="0">0</button>
        <button class="btn" data-key=".">.</button>
        <button class="btn eq" data-key="=">=</button>
      </div>
    </div>

    <script>
      const { invoke } = window.__TAURI_INTERNALS__;
      const exprEl = document.getElementById("expr");
      const resultEl = document.getElementById("result");
      const displayMap = { "*": "×", "/": "÷", "-": "−" };
      let expr = "";
      let justEvaluated = false;
      const ops = new Set(["+", "-", "*", "/", "%"]);

      document.querySelector(".buttons").addEventListener("click", (e) => {
        const key = e.target.dataset.key;
        if (!key) return;
        handleKey(key);
      });

      document.addEventListener("keydown", (e) => {
        const map = { Enter: "=", Backspace: "DEL", Escape: "AC", Delete: "AC", "*": "*", "/": "/", "+": "+", "-": "-", ".": ".", "%": "%" };
        if (e.key in map) { e.preventDefault(); handleKey(map[e.key]); }
        else if (/^\d$/.test(e.key)) { handleKey(e.key); }
      });

      function handleKey(key) {
        if (key === "AC") return clearAll();
        if (key === "DEL") return deleteLast();
        if (key === "=") return openInBrowser();

        if (justEvaluated) { justEvaluated = false; if (!ops.has(key)) expr = ""; }

        if (ops.has(key)) {
          if (!expr && key === "-") { expr = "-"; return updateDisplay(); }
          if (!expr) return;
          if (ops.has(lastChar())) expr = expr.slice(0, -1);
          expr += key;
        } else if (key === ".") {
          if (!expr) expr = "0";
          const parts = expr.split(/[+\-*/%]/);
          if (!parts[parts.length - 1].includes(".")) expr += ".";
        } else {
          expr += key;
        }
        updateDisplay();
      }

      async function openInBrowser() {
        try { await invoke("open_baidu", { keyword: expr }); }
        catch (e) { resultEl.textContent = e; }
      }

      function clearAll() { expr = ""; resultEl.textContent = "0"; justEvaluated = false; updateDisplay(); }

      function deleteLast() { if (justEvaluated) return clearAll(); expr = expr.slice(0, -1); updateDisplay(); }

      function lastChar() { return expr[expr.length - 1]; }

      function updateDisplay() {
        exprEl.textContent = expr.replace(/[*\/-]/g, (c) => displayMap[c]);
        if (!expr) resultEl.textContent = "0";
      }
    </script>
  </body>
</html>
